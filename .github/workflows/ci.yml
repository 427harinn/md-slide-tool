name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  smoke:
    name: Smoke test
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run smoke test
        run: bash scripts/smoke-test.sh
